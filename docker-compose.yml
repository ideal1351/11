version: '3.8'

networks:
  app-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

services:
  # Go сервис
  go-service:
    build:
      context: ./go-service
      dockerfile: Dockerfile
    container_name: go-service
    ports:
      - "8080:8080"
    networks:
      app-network:
        ipv4_address: 172.20.0.10
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Python сервис
  python-service:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    container_name: python-service
    ports:
      - "8000:8000"
    networks:
      app-network:
        ipv4_address: 172.20.0.20
    depends_on:
      - go-service
    environment:
      - GO_SERVICE_URL=http://go-service:8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/fast/ping')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Rust сервис (добавлен для полноты)
  rust-service:
    build:
      context: ./rust-service
      dockerfile: Dockerfile.musl
    container_name: rust-service
    ports:
      - "8082:8082"
    networks:
      app-network:
        ipv4_address: 172.20.0.30
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/health"]
      interval: 30s
      timeout: 5s
      retries: 3
